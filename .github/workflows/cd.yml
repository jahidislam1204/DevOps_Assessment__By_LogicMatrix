name: CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  BACKEND_ECR_REPOSITORY: ${{ vars.BACKEND_ECR_REPOSITORY }}
  FRONTEND_ECR_REPOSITORY: ${{ vars.FRONTEND_ECR_REPOSITORY }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  K8S_MANIFESTS_DIR: k8s
  K8S_NAMESPACE: note-app
  BACKEND_DEPLOYMENT_NAME: backend
  FRONTEND_DEPLOYMENT_NAME: frontend
  BACKEND_CONTAINER_NAME: backend
  FRONTEND_CONTAINER_NAME: frontend
  IMAGE_TAG: ${{ github.sha }}
  BACKEND_IMAGE_URI: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.BACKEND_ECR_REPOSITORY }}
  FRONTEND_IMAGE_URI: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.FRONTEND_ECR_REPOSITORY }}

jobs:
  publish:
    name: Publish Images To Amazon ECR
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate deployment variables
        shell: bash
        run: |
          set -euo pipefail

          required_vars=(
            AWS_REGION
            AWS_ACCOUNT_ID
            BACKEND_ECR_REPOSITORY
            FRONTEND_ECR_REPOSITORY
            EKS_CLUSTER_NAME
          )

          for var_name in "${required_vars[@]}"; do
            if [[ -z "${!var_name:-}" ]]; then
              echo "Required GitHub variable is missing: ${var_name}" >&2
              exit 1
            fi
          done

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE_URI }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=backend-cd
          cache-to: type=gha,mode=max,scope=backend-cd

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE_URI }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=frontend-cd
          cache-to: type=gha,mode=max,scope=frontend-cd

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - publish
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Create release from tag
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Backend image: `${{ env.BACKEND_IMAGE_URI }}:${{ env.IMAGE_TAG }}`
            Frontend image: `${{ env.FRONTEND_IMAGE_URI }}:${{ env.IMAGE_TAG }}`

  deploy:
    name: Deploy To Amazon EKS
    runs-on: ubuntu-latest
    needs:
      - publish
      - release
    if: |
      always() &&
      needs.publish.result == 'success' &&
      (
        github.ref == 'refs/heads/main' ||
        (startsWith(github.ref, 'refs/tags/') && needs.release.result == 'success')
      )
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig for Amazon EKS
        shell: bash
        run: |
          set -euo pipefail
          aws eks update-kubeconfig \
            --name "${EKS_CLUSTER_NAME}" \
            --region "${AWS_REGION}"

      - name: Apply Kubernetes manifests
        shell: bash
        run: |
          set -euo pipefail
          kubectl apply -f "${K8S_MANIFESTS_DIR}"

      - name: Update backend deployment image
        shell: bash
        run: |
          set -euo pipefail
          kubectl set image deployment/"${BACKEND_DEPLOYMENT_NAME}" \
            "${BACKEND_CONTAINER_NAME}"="${BACKEND_IMAGE_URI}:${IMAGE_TAG}" \
            --namespace "${K8S_NAMESPACE}"

      - name: Update frontend deployment image
        shell: bash
        run: |
          set -euo pipefail
          kubectl set image deployment/"${FRONTEND_DEPLOYMENT_NAME}" \
            "${FRONTEND_CONTAINER_NAME}"="${FRONTEND_IMAGE_URI}:${IMAGE_TAG}" \
            --namespace "${K8S_NAMESPACE}"

  verify:
    name: Verify Deployment Rollout
    runs-on: ubuntu-latest
    needs:
      - deploy
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig for Amazon EKS
        shell: bash
        run: |
          set -euo pipefail
          aws eks update-kubeconfig \
            --name "${EKS_CLUSTER_NAME}" \
            --region "${AWS_REGION}"

      - name: Wait for backend rollout
        shell: bash
        run: |
          set -euo pipefail
          kubectl rollout status deployment/"${BACKEND_DEPLOYMENT_NAME}" \
            --namespace "${K8S_NAMESPACE}" \
            --timeout=300s

      - name: Wait for frontend rollout
        shell: bash
        run: |
          set -euo pipefail
          kubectl rollout status deployment/"${FRONTEND_DEPLOYMENT_NAME}" \
            --namespace "${K8S_NAMESPACE}" \
            --timeout=300s

      - name: Verify deployed image tags
        shell: bash
        run: |
          set -euo pipefail

          backend_image="$(kubectl get deployment "${BACKEND_DEPLOYMENT_NAME}" \
            --namespace "${K8S_NAMESPACE}" \
            -o jsonpath='{.spec.template.spec.containers[?(@.name=="'"${BACKEND_CONTAINER_NAME}"'")].image}')"

          frontend_image="$(kubectl get deployment "${FRONTEND_DEPLOYMENT_NAME}" \
            --namespace "${K8S_NAMESPACE}" \
            -o jsonpath='{.spec.template.spec.containers[?(@.name=="'"${FRONTEND_CONTAINER_NAME}"'")].image}')"

          [[ "${backend_image}" == "${BACKEND_IMAGE_URI}:${IMAGE_TAG}" ]]
          [[ "${frontend_image}" == "${FRONTEND_IMAGE_URI}:${IMAGE_TAG}" ]]

      - name: Capture rollout diagnostics
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          kubectl get deployments,pods,services --namespace "${K8S_NAMESPACE}" -o wide
