name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  BACKEND_CONTEXT: backend
  FRONTEND_CONTEXT: frontend
  K8S_MANIFESTS_DIR: k8s
  IMAGE_TAG: ${{ github.sha }}

jobs:
  validate:
    name: Validate Source And Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate repository structure
        shell: bash
        run: |
          set -euo pipefail

          required_paths=(
            "${BACKEND_CONTEXT}/Dockerfile"
            "${BACKEND_CONTEXT}/requirements.txt"
            "${FRONTEND_CONTEXT}/Dockerfile"
            "${FRONTEND_CONTEXT}/index.html"
            "${K8S_MANIFESTS_DIR}"
          )

          for path in "${required_paths[@]}"; do
            if [[ ! -e "${path}" ]]; then
              echo "Missing required path: ${path}" >&2
              exit 1
            fi
          done

      - name: Validate Python syntax
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import ast
          from pathlib import Path

          for path in Path("backend").rglob("*.py"):
              ast.parse(path.read_text(encoding="utf-8"), filename=str(path))

          print("Python syntax validation passed.")
          PY

      - name: Validate Kubernetes manifests
        shell: bash
        run: |
          set -euo pipefail
          kubectl create --dry-run=client --validate=false -f "${K8S_MANIFESTS_DIR}" -o name

  test:
    name: Run Application Tests
    runs-on: ubuntu-latest
    needs:
      - validate
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend test dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r "${BACKEND_CONTEXT}/requirements.txt"

      - name: Run backend tests
        shell: bash
        working-directory: backend
        run: |
          set -euo pipefail
          python -m unittest discover -s tests -p "test_*.py" -v

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs:
      - test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BACKEND_CONTEXT }}
          file: ${{ env.BACKEND_CONTEXT }}/Dockerfile
          push: false
          tags: backend:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=backend-ci
          cache-to: type=gha,mode=max,scope=backend-ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.FRONTEND_CONTEXT }}
          file: ${{ env.FRONTEND_CONTEXT }}/Dockerfile
          push: false
          tags: frontend:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=frontend-ci
          cache-to: type=gha,mode=max,scope=frontend-ci
