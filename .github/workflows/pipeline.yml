name: Build, Push, and Deploy to EKS

on:
  push:
    branches:
      - main
      - mobypay
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-2' }}
  BACKEND_ECR_REPOSITORY: ${{ vars.BACKEND_ECR_REPOSITORY || 'note-backend' }}
  FRONTEND_ECR_REPOSITORY: ${{ vars.FRONTEND_ECR_REPOSITORY || 'note-frontend' }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'note-app-eks' }}
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'note-app' }}
  K8S_MANIFESTS_DIR: k8s
  BACKEND_CONTEXT: backend
  FRONTEND_CONTEXT: frontend
  BACKEND_DEPLOYMENT_NAME: ${{ vars.BACKEND_DEPLOYMENT_NAME || 'backend' }}
  FRONTEND_DEPLOYMENT_NAME: ${{ vars.FRONTEND_DEPLOYMENT_NAME || 'frontend' }}
  BACKEND_CONTAINER_NAME: ${{ vars.BACKEND_CONTAINER_NAME || 'backend' }}
  FRONTEND_CONTAINER_NAME: ${{ vars.FRONTEND_CONTAINER_NAME || 'frontend' }}
  ROLLOUT_TIMEOUT: 300s

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    outputs:
      backend_image_uri: ${{ steps.image-uri.outputs.backend_image_uri }}
      frontend_image_uri: ${{ steps.image-uri.outputs.frontend_image_uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate AWS secrets
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ] || [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY secrets are required."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image URI variables
        id: image-uri
        run: |
          set -euo pipefail
          BACKEND_IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${{ env.BACKEND_ECR_REPOSITORY }}:${GITHUB_SHA}"
          FRONTEND_IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${{ env.FRONTEND_ECR_REPOSITORY }}:${GITHUB_SHA}"
          BACKEND_LATEST_IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${{ env.BACKEND_ECR_REPOSITORY }}:latest"
          FRONTEND_LATEST_IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${{ env.FRONTEND_ECR_REPOSITORY }}:latest"

          echo "BACKEND_IMAGE_URI=${BACKEND_IMAGE_URI}" >> "${GITHUB_ENV}"
          echo "FRONTEND_IMAGE_URI=${FRONTEND_IMAGE_URI}" >> "${GITHUB_ENV}"
          echo "BACKEND_LATEST_IMAGE_URI=${BACKEND_LATEST_IMAGE_URI}" >> "${GITHUB_ENV}"
          echo "FRONTEND_LATEST_IMAGE_URI=${FRONTEND_LATEST_IMAGE_URI}" >> "${GITHUB_ENV}"
          echo "backend_image_uri=${BACKEND_IMAGE_URI}" >> "${GITHUB_OUTPUT}"
          echo "frontend_image_uri=${FRONTEND_IMAGE_URI}" >> "${GITHUB_OUTPUT}"
          echo "backend_latest_image_uri=${BACKEND_LATEST_IMAGE_URI}" >> "${GITHUB_OUTPUT}"
          echo "frontend_latest_image_uri=${FRONTEND_LATEST_IMAGE_URI}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BACKEND_CONTEXT }}
          file: ${{ env.BACKEND_CONTEXT }}/Dockerfile
          push: true
          tags: |
            ${{ steps.image-uri.outputs.backend_image_uri }}
            ${{ steps.image-uri.outputs.backend_latest_image_uri }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.FRONTEND_CONTEXT }}
          file: ${{ env.FRONTEND_CONTEXT }}/Dockerfile
          push: true
          tags: |
            ${{ steps.image-uri.outputs.frontend_image_uri }}
            ${{ steps.image-uri.outputs.frontend_latest_image_uri }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to EKS
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig for EKS
        run: |
          set -euo pipefail
          aws eks update-kubeconfig \
            --name "${EKS_CLUSTER_NAME}" \
            --region "${AWS_REGION}" \
            --alias "${EKS_CLUSTER_NAME}"

      - name: Deploy manifests to EKS
        run: |
          set -euo pipefail
          kubectl apply -f "${K8S_MANIFESTS_DIR}"

      - name: Update Kubernetes deployment images
        run: |
          set -euo pipefail
          kubectl set image deployment/"${BACKEND_DEPLOYMENT_NAME}" \
            "${BACKEND_CONTAINER_NAME}"="${{ needs.build-and-push.outputs.backend_image_uri }}" \
            --namespace "${K8S_NAMESPACE}"

          kubectl set image deployment/"${FRONTEND_DEPLOYMENT_NAME}" \
            "${FRONTEND_CONTAINER_NAME}"="${{ needs.build-and-push.outputs.frontend_image_uri }}" \
            --namespace "${K8S_NAMESPACE}"

      - name: Verify EKS rollout
        run: |
          set -euo pipefail
          kubectl rollout status deployment/"${BACKEND_DEPLOYMENT_NAME}" \
            --namespace "${K8S_NAMESPACE}" \
            --timeout="${ROLLOUT_TIMEOUT}"

          kubectl rollout status deployment/"${FRONTEND_DEPLOYMENT_NAME}" \
            --namespace "${K8S_NAMESPACE}" \
            --timeout="${ROLLOUT_TIMEOUT}"

          kubectl get pods --namespace "${K8S_NAMESPACE}" -o wide
          kubectl get services --namespace "${K8S_NAMESPACE}" -o wide
          kubectl get ingress --namespace "${K8S_NAMESPACE}" -o wide

      - name: Deployment diagnostics on failure
        if: failure()
        run: |
          kubectl get pods --namespace "${K8S_NAMESPACE}" -o wide || true
          kubectl describe pods --namespace "${K8S_NAMESPACE}" || true
          kubectl get events --namespace "${K8S_NAMESPACE}" --sort-by=.lastTimestamp || true
