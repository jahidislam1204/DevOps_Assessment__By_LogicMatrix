# Example secret manifest for local bootstrap or initial deployment.
# Replace placeholder values during deployment and avoid committing real secrets.
# This layout can later be migrated to AWS Secrets Manager + External Secrets Operator
# without changing the application contract.
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: note-app
  labels:
    app.kubernetes.io/name: note-app
    app.kubernetes.io/component: backend
    app.kubernetes.io/version: bootstrap
    app.kubernetes.io/managed-by: kubectl
type: Opaque
stringData:
  # Placeholder values keep kubectl apply valid; replace them for real database writes.
  DB_USER: "adminuser"
  DB_PASSWORD: "replace-with-the-rds-password"
  SECRET_KEY: "replace-with-a-strong-flask-secret"
