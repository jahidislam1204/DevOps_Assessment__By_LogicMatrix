# Shared ServiceAccount for application workloads.
# The IRSA annotation value is intentionally a placeholder so Terraform or your
# deployment process can inject the correct IAM role ARN later.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: note-app-workload
  namespace: note-app
  labels:
    app.kubernetes.io/name: note-app
    app.kubernetes.io/component: identity
    app.kubernetes.io/version: "<IMAGE_TAG>"
    app.kubernetes.io/managed-by: kubectl
  annotations:
    # Placeholder for future IAM Roles for Service Accounts integration.
    eks.amazonaws.com/role-arn: "arn:aws:iam::009907128734:role/<IRSA_ROLE_NAME>"
automountServiceAccountToken: false
